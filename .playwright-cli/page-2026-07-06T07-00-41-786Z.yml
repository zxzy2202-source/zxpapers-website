        - heading "Carbonless Records for Handover, Release and Damage Proof" [level=2] [ref=e135]
        - generic [ref=e136]:
          - paragraph [ref=e137]: Many port and air-cargo systems are digital, but physical signed records still matter when cargo, vehicles, containers and regulatory parties meet at the same handover point. NCR forms give each party an immediate copy without re-entering the record.
          - paragraph [ref=e138]: These buyers care about responsibility boundaries more than generic stationery. The form should show cargo numbers, seal numbers, container condition, driver details, release authority, abnormal cargo notes and the signatures that prove responsibility transfer.
          - paragraph [ref=e139]: ZhixinPaper prints port and customs NCR forms with sequential numbering, copy-color roles, barcodes or QR codes, damage diagrams and reinforced export packaging for humid ports and long-distance sea freight.
